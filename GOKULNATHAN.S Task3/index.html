<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="icon">🌡️</div>

        <h1>Temperature Converter</h1>

        <div class="input-group">
            <label>Enter Temperature</label>
            <input type="number" id="temperature" placeholder="e.g. 25">
        </div>

        <div class="input-group">
            <label>Convert From</label>
            <select id="fromUnit">
                <option value="C">Celsius</option>
                <option value="F">Fahrenheit</option>
                <option value="K">Kelvin</option>
            </select>
        </div>

        <div class="input-group">
            <label>Convert To</label>
            <select id="toUnit">
                <option value="F">Fahrenheit</option>
                <option value="C">Celsius</option>
                <option value="K">Kelvin</option>
            </select>
        </div>

        <button class="convert-btn" onclick="convertTemperature()">
            Convert
        </button>

        <div class="result">
            <h2>Converted Temperature</h2>
            <p id="result">-- °</p>
        </div>
    </div>

    <script>
        function convertTemperature() {
            const temp = parseFloat(document.getElementById("temperature").value);
            const from = document.getElementById("fromUnit").value;
            const to = document.getElementById("toUnit").value;
            const result = document.getElementById("result");

            if (isNaN(temp)) {
                result.textContent = "Please enter a valid number";
                return;
            }

            let converted;

            if (from === to) {
                converted = temp;
            } 
            else if (from === "C" && to === "F") {
                converted = (temp * 9 / 5) + 32;
            } 
            else if (from === "C" && to === "K") {
                converted = temp + 273.15;
            } 
            else if (from === "F" && to === "C") {
                converted = (temp - 32) * 5 / 9;
            } 
            else if (from === "F" && to === "K") {
                converted = ((temp - 32) * 5 / 9) + 273.15;
            } 
            else if (from === "K" && to === "C") {
                converted = temp - 273.15;
            } 
            else if (from === "K" && to === "F") {
                converted = ((temp - 273.15) * 9 / 5) + 32;
            }

            result.textContent = `${converted.toFixed(2)} °${to}`;
        }
    </script>

</body>
</html>
